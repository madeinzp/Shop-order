<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Адмін — Оновлення прайсу</title>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--surface:#fff;--accent:#2d6a4f;--al:#e8f4ee;--a2:#74c69d;--danger:#e63946;--text:#1a1a1a;--muted:#888;--border:#e0ddd7}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Geologica',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px 16px}

.card{background:var(--surface);border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,.07);padding:32px;width:100%;max-width:480px}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-badge{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);background:var(--al);padding:5px 11px;border-radius:7px}
.logo-title{font-size:18px;font-weight:700}

/* SERVER INPUT */
.section{margin-bottom:22px}
.label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.input{width:100%;border:1.5px solid var(--border);border-radius:11px;padding:11px 14px;font-size:14px;font-family:'Geologica',sans-serif;color:var(--text);outline:none;transition:border-color .2s;background:#fafafa}
.input:focus{border-color:var(--accent);background:#fff}

/* DROP ZONE */
.drop-zone{border:2px dashed var(--border);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa;position:relative}
.drop-zone:hover,.drop-zone.drag{border-color:var(--accent);background:var(--al)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:40px;margin-bottom:10px}
.dz-title{font-size:15px;font-weight:600;margin-bottom:5px}
.dz-sub{font-size:12px;color:var(--muted)}
.dz-file{display:none;align-items:center;gap:10px;background:var(--al);border:1.5px solid var(--a2);border-radius:10px;padding:12px 14px;margin-top:14px}
.dz-file.show{display:flex}
.dz-file-name{font-size:13px;font-weight:500;flex:1}
.dz-file-rm{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:0 4px}

/* BUTTON */
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:600;font-family:'Geologica',sans-serif;cursor:pointer;transition:opacity .2s;margin-top:6px}
.btn:active{opacity:.85}.btn:disabled{opacity:.5;cursor:not-allowed}

/* LOG */
.log{margin-top:18px;background:#f8f8f8;border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;max-height:200px;overflow-y:auto;display:none}
.log.show{display:block}
.log-line{display:block}
.log-ok{color:var(--accent)}.log-err{color:var(--danger)}.log-info{color:#555}

/* STATUS */
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;margin-right:6px;vertical-align:middle}
.status-dot.online{background:#4caf50}.status-dot.offline{background:var(--danger)}
.server-status{font-size:12px;color:var(--muted);margin-top:6px}

/* HISTORY */
.history{margin-top:24px;width:100%;max-width:480px}
.history-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.hist-item{background:var(--surface);border-radius:12px;padding:12px 16px;margin-bottom:8px;font-size:13px;box-shadow:0 1px 6px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center}
.hist-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-badge">ADMIN</div>
    <div class="logo-title">Панель управління</div>
  </div>

  <!-- SERVER URL -->
  <div class="section">
    <div class="label">Адреса сервера (ngrok URL)</div>
    <input class="input" id="serverUrl" placeholder="https://xxxx-xx-xx-xx-xx.ngrok-free.app"
      oninput="saveServer()" value="">
    <div class="server-status" id="serverStatus">
      <span class="status-dot" id="dot"></span><span id="statusText">Введіть адресу сервера</span>
    </div>
  </div>

  <!-- ADMIN ID -->
  <div class="section">
    <div class="label">Ваш Telegram ID (для авторизації)</div>
    <input class="input" id="adminId" placeholder="123456789" oninput="saveAdminId()" value="">
  </div>

  <!-- DROP ZONE -->
  <div class="section">
    <div class="label">Файл наявності (.xlsx)</div>
    <div class="drop-zone" id="dz"
      ondragover="ev.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="onDrop(event)">
      <input type="file" accept=".xlsx" id="fileInput" onchange="onFileSelect(this)">
      <div class="dz-icon">📂</div>
      <div class="dz-title">Перетягніть файл або натисніть</div>
      <div class="dz-sub">Підтримується формат .xlsx</div>
    </div>
    <div class="dz-file" id="dzFile">
      <span>📊</span>
      <span class="dz-file-name" id="dzFileName"></span>
      <button class="dz-file-rm" onclick="clearFile()">✕</button>
    </div>
  </div>

  <button class="btn" id="uploadBtn" onclick="uploadFile()" disabled>
    ⬆ Завантажити та оновити прайс
  </button>

  <div class="log" id="log"></div>
</div>

<div class="history">
  <div class="history-title">Остання активність</div>
  <div id="historyList"></div>
</div>

<script>
let selectedFile = null;

// ── Persist settings ──
const $ = id => document.getElementById(id);

window.onload = () => {
  const sv = localStorage.getItem('serverUrl') || '';
  const ai = localStorage.getItem('adminId') || '';
  $('serverUrl').value = sv;
  $('adminId').value = ai;
  if(sv) checkServer(sv);
  renderHistory();
};

function saveServer(){
  const v = $('serverUrl').value.trim();
  localStorage.setItem('serverUrl', v);
  if(v) checkServer(v);
}
function saveAdminId(){ localStorage.setItem('adminId', $('adminId').value.trim()); }

async function checkServer(url){
  $('statusText').textContent = 'Перевірка...';
  $('dot').className = 'status-dot';
  try{
    const r = await fetch(url+'/products', {signal: AbortSignal.timeout(4000)});
    if(r.ok){
      const data = await r.json();
      $('statusText').textContent = `Сервер онлайн · ${data.length} товарів`;
      $('dot').className = 'status-dot online';
    } else throw new Error();
  } catch(e){
    $('statusText').textContent = 'Сервер недоступний — запустіть ngrok та bot.py';
    $('dot').className = 'status-dot offline';
  }
}

// ── File handling ──
function onFileSelect(inp){
  if(inp.files[0]) setFile(inp.files[0]);
}
function onDrop(e){
  e.preventDefault();
  $('dz').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if(f && f.name.endsWith('.xlsx')) setFile(f);
  else logLine('Потрібен файл .xlsx', 'err');
}
function setFile(f){
  selectedFile = f;
  $('dzFileName').textContent = f.name;
  $('dzFile').classList.add('show');
  $('uploadBtn').disabled = false;
  logLine(`📁 Обрано: ${f.name} (${(f.size/1024).toFixed(1)} KB)`, 'info');
}
function clearFile(){
  selectedFile = null;
  $('fileInput').value = '';
  $('dzFile').classList.remove('show');
  $('uploadBtn').disabled = true;
}

// ── Upload ──
async function uploadFile(){
  const server = $('serverUrl').value.trim().replace(/\/$/, '');
  const adminId = $('adminId').value.trim();
  if(!server){ logLine('Введіть адресу сервера!', 'err'); return; }
  if(!adminId){ logLine('Введіть ваш Telegram ID!', 'err'); return; }
  if(!selectedFile){ logLine('Оберіть файл!', 'err'); return; }

  $('uploadBtn').disabled = true;
  $('uploadBtn').textContent = '⏳ Завантажуємо...';
  logLine(`Надсилаємо ${selectedFile.name}...`, 'info');

  const formData = new FormData();
  formData.append('file', selectedFile);

  try{
    const r = await fetch(server+'/upload', {
      method: 'POST',
      headers: { 'X-Admin-Key': adminId },
      body: formData
    });
    const res = await r.json();
    if(res.ok){
      logLine(`✅ Успішно! Оновлено ${res.count} товарів`, 'ok');
      addHistory(`Оновлено прайс: ${res.count} товарів · ${selectedFile.name}`);
      clearFile();
      await checkServer(server);
    } else {
      logLine(`❌ Помилка: ${res.error}`, 'err');
    }
  } catch(e){
    logLine(`❌ Не вдалось: ${e.message}`, 'err');
    logLine('Перевірте що ngrok та bot.py запущені', 'info');
  }

  $('uploadBtn').disabled = false;
  $('uploadBtn').textContent = '⬆ Завантажити та оновити прайс';
}

// ── Log ──
function logLine(msg, type='info'){
  const log = $('log');
  log.classList.add('show');
  const line = document.createElement('span');
  line.className = `log-line log-${type}`;
  const time = new Date().toLocaleTimeString('uk');
  line.textContent = `[${time}] ${msg}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

// ── History ──
function addHistory(text){
  const history = JSON.parse(localStorage.getItem('history')||'[]');
  history.unshift({ text, time: new Date().toLocaleString('uk') });
  if(history.length > 10) history.pop();
  localStorage.setItem('history', JSON.stringify(history));
  renderHistory();
}
function renderHistory(){
  const history = JSON.parse(localStorage.getItem('history')||'[]');
  $('historyList').innerHTML = history.map(h =>
    `<div class="hist-item"><span>${h.text}</span><span class="hist-time">${h.time}</span></div>`
  ).join('') || '<div style="font-size:13px;color:#aaa;text-align:center">Ще немає активності</div>';
}
</script>
</body>
</html>
